name: Android Build & Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.ver.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Merge GitHub contributors
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/merge-github-contributors.js

      - name: Download token logos
        run: node scripts/generate-logos.js

      - name: Install NDK
        run: echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build release APKs
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: cd android && ./gradlew clean assembleFullRelease assembleOfflineRelease -PreactNativeArchitectures=arm64-v8a,armeabi-v7a --no-daemon

      - name: Generate APK checksums
        run: |
          mkdir -p android/app/build/outputs/apk/release
          find android/app/build/outputs/apk -name "app-*-release.apk" \
            | sort | xargs sha256sum > android/app/build/outputs/apk/release/SHA256SUMS.txt

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_FILE=android/app/build/outputs/apk/release/RELEASE_NOTES.md
          CURRENT_TAG="${{ steps.ver.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${CURRENT_TAG}$" \
            | sed -n '1p')

          if [ -n "$PREV_TAG" ]; then
            gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$CURRENT_TAG" \
              -f previous_tag_name="$PREV_TAG" \
              --jq .body > "$NOTES_FILE"
          else
            gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$CURRENT_TAG" \
              --jq .body > "$NOTES_FILE"
          fi

          {
            echo
            echo "## APK SHA256 checksums"
            echo
            echo '```text'
            cat android/app/build/outputs/apk/release/SHA256SUMS.txt
            echo '```'
            echo
          } >> "$NOTES_FILE"

      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          body_path: android/app/build/outputs/apk/release/RELEASE_NOTES.md
          files: |
            android/app/build/outputs/apk/full/release/app-*-release.apk
            android/app/build/outputs/apk/offline/release/app-*-release.apk
            android/app/build/outputs/apk/release/SHA256SUMS.txt

  fdroid:
    name: Publish F-Droid Repository
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Install fdroidserver
        run: pip install fdroidserver

      - name: Restore keystore
        run: echo "${{ secrets.FDROID_KEYSTORE_B64 }}" | base64 -d > fdroid/keystore.p12

      - name: Restore APKs from all previous releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
        run: |
          mkdir -p fdroid/repo
          gh release list --limit 100 --json tagName --jq '.[].tagName' \
            | grep -v "^${RELEASE_TAG}$" \
            | while read tag; do
                gh release download "$tag" \
                  --pattern "app-offline-*-release.apk" \
                  --pattern "app-full-*-release.apk" \
                  --dir fdroid/repo/ \
                  --clobber 2>/dev/null || true
              done

      - name: Download current release APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
        run: |
          mkdir -p new-apks/
          gh release download "$RELEASE_TAG" \
            --pattern "app-offline-*-release.apk" \
            --pattern "app-full-*-release.apk" \
            --dir new-apks/
          count=$(find new-apks -maxdepth 1 -name "*.apk" | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "No APKs downloaded for $RELEASE_TAG — check release asset names."
            exit 1
          fi
          cp new-apks/*.apk fdroid/repo/

      - name: Copy repo icon
        run: cp fastlane/metadata/android/en-US/images/icon.png fdroid/icon.png

      - name: Run fdroid update
        working-directory: fdroid
        run: fdroid update --verbose
        env:
          FDROID_KEYSTORE_PASS: ${{ secrets.FDROID_KEYSTORE_PASS }}
          FDROID_KEY_PASS: ${{ secrets.FDROID_KEY_PASS }}

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages
          cp -r fdroid/repo pages/repo
          cp -r fdroid/archive pages/archive 2>/dev/null || true
          echo "fdroid.gapsign.tech" > pages/CNAME

      - name: Clean up credentials
        if: always()
        run: rm -f fdroid/keystore.p12

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
